<!DOCTYPE html>
<div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="text-gray-500 uppercase text-xs border-b border-gray-700">
                <th class="pb-3 pl-2 font-medium">Статус</th>
                <th class="pb-3 font-medium">IP Адрес</th>
                <th class="pb-3 font-medium">MAC Адрес</th>
                <th class="pb-3 font-medium">Имя устройства</th>
            </tr>
        </thead>
        <tbody class="text-sm">
            {% for dev in devices %}
            <tr class="border-b border-gray-800 hover:bg-gray-800/50 transition">
                <td class="py-4 pl-2">
                    <span class="flex h-2 w-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></span>
                </td>
                <td class="py-4 font-mono text-blue-400">{{ dev.ip }}</td>
                <td class="py-4 text-gray-400 font-mono">{{ dev.mac }}</td>
                <td class="py-4 text-gray-200">{{ dev.name }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
