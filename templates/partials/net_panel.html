<!DOCTYPE html>
<div class="animate-fade-in">
    <div class="flex justify-between items-end mb-8">
        <div>
            <h2 class="text-3xl font-bold">NetPanel</h2>
            <p class="text-gray-400">Мониторинг сетевой активности в реальном времени</p>
        </div>

        <button hx-get="/devices/list"
                hx-target="#devices-container"
                class="text-sm bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg transition border border-gray-600">
            🔄 Обновить список
        </button>
    </div>

    <div class="flex justify-center mb-12 bg-gray-900/50 py-8 rounded-3xl border border-dashed border-gray-700">
        <div id="control-button-wrapper">
             <button hx-post="/control/start"
                     hx-target="#control-button-wrapper"
                    hx-swap="outerHTML"
                    class="bg-green-600 hover:bg-green-500 text-white px-12 py-4 rounded-full font-bold shadow-xl transition-all active:scale-95">
                🚀 ЗАПУСТИТЬ СКАНИРОВАНИЕ
            </button>
        </div>
    </div>

    <div class="bg-gray-800 border border-gray-700 rounded-2xl p-6 shadow-inner">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-lg font-semibold">Обнаруженные устройства</h3>
            <span class="text-xs text-gray-500 font-mono italic">Источник: Redis HSET</span>
        </div>

        <div id="devices-container" hx-get="/devices/list" hx-trigger="load">
            <div class="flex justify-center p-10">
                <span class="animate-pulse text-gray-600 italic text-sm">Поиск устройств в базе данных...</span>
            </div>
        </div>
    </div>
</div>
